<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Host</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Image Host</h1>

<input id="search" placeholder="Search images...">

<div id="dropzone">
<button id="uploadBtn">Upload Images</button>
<input type="file" id="upload" multiple hidden>
<p>Drag & Drop images here</p>
</div>

<div id="progress"></div>

<div id="gallery"></div>

</div>

<div id="lightbox">
<img id="lightboxImg">
</div>

<div id="toast">Copied!</div>

<script src="script.js"></script>

</body>
</html>
